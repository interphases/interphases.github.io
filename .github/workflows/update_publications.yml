name: Update ORCID Publications

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00
  workflow_dispatch:

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests bibtexparser

      - name: Fetch publications from ORCID + Crossref
        run: python fetch_orcid_publications.py

      - name: Commit updated BibTeX file
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add publications.bib
          git commit -m "Auto-update publications from ORCID" || echo "No changes to commit"
          git push

      - name: Format publications into ACS style
        run: python format_publications.py

      - name: Commit updated files
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add publications.bib publications.md
          git commit -m "Auto-update publications" || echo "No changes to commit"
          git push

