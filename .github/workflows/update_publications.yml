name: Update Google Scholar Publications (SerpAPI)

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00
  workflow_dispatch:

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch publications using SerpAPI
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python fetch_scholar_serpapi.py

      - name: Commit updated BibTeX file
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add publications.bib
          git commit -m "Auto-update publications from Google Scholar (SerpAPI)" || echo "No changes to commit"
          git push
