name: Update Publications from ORCID

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch: 

jobs:
  update-records:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch ORCID Data
        run: |
          python <<EOF
          import requests
          import yaml
          import os

          ORCID_ID = '0000-0001-5653-0383' # <--- REPLACE WITH YOUR ID
          url = f"https://pub.orcid.org/v3.0/{ORCID_ID}/works"
          header = {"Accept": "application/json"}
          
          response = requests.get(url, headers=header)
          data = response.json()
          
          publications = []
          for work in data.get('group', []):
              summary = work.get('work-summary', [{}])[0]
              title = summary.get('title', {}).get('title', {}).get('value', 'No Title')
              year = summary.get('publication-date', {}).get('year', {}).get('value', 'N/A')
              journal = summary.get('journal-title', {}).get('value', 'N/A')
              
              # Try to get a DOI/URL
              external_ids = summary.get('external-ids', {}).get('external-id', [])
              url_val = ""
              for eid in external_ids:
                  if eid.get('external-id-type') == 'doi':
                      url_val = f"https://doi.org/{eid.get('external-id-value')}"

              publications.append({
                  'title': title,
                  'year': year,
                  'journal': journal,
                  'url': url_val
              })

          os.makedirs('_data', exist_ok=True)
          with open('_data/publications.yml', 'w') as f:
              yaml.dump(publications, f, sort_keys=False)
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/publications.yml
          git commit -m "Auto-update publications from ORCID" || exit 0
          git push