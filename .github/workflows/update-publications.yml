import requests
          import yaml
          import os

          # Ensure there are no spaces or extra characters in your ID
          ORCID_ID = '0000-0001-5653-0383' 
          url = f"https://pub.orcid.org/v3.0/{ORCID_ID}/works"
          header = {"Accept": "application/json"}
          
          try:
              response = requests.get(url, headers=header)
              response.raise_for_status()
              data = response.json()
              
              # Debug: Print keys to the log so we can see what ORCID sent
              print(f"Keys found in ORCID response: {data.keys()}")
              
              publications = []
              # Safeguard: use .get() with an empty list [] if 'group' is missing
              groups = data.get('group') or []
              
              for group in groups:
                  # Safeguard: ensure work-summary exists
                  summaries = group.get('work-summary') or []
                  for work in summaries:
                      title_info = work.get('title') or {}
                      title_val = title_info.get('title') or {}
                      title = title_val.get('value', 'Untitled')
                      
                      date_info = work.get('publication-date') or {}
                      year_val = date_info.get('year') or {}
                      year = year_val.get('value', 'N/A')
                      
                      journal_info = work.get('journal-title') or {}
                      journal = journal_info.get('value', 'N/A')
                      
                      url_val = ""
                      ext_ids_info = work.get('external-ids') or {}
                      ext_ids = ext_ids_info.get('external-id') or []
                      for eid in ext_ids:
                          if eid.get('external-id-type') == 'doi':
                              url_val = f"https://doi.org/{eid.get('external-id-value')}"
                              break

                      publications.append({
                          'title': str(title),
                          'year': str(year),
                          'journal': str(journal),
                          'url': str(url_val)
                      })

              # Sort only if we actually found publications
              if publications:
                  publications.sort(key=lambda x: x['year'], reverse=True)

              os.makedirs('_data', exist_ok=True)
              with open('_data/publications.yml', 'w', encoding='utf-8') as f:
                  yaml.dump(publications, f, allow_unicode=True, sort_keys=False)
              
              print(f"Successfully saved {len(publications)} publications.")
                  
          except Exception as e:
              print(f"Error occurred: {e}")
              # We don't exit(1) here so we can see the debug prints above