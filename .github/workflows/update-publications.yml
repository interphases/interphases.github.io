name: Update Publications from ORCID

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch: 

jobs:
  update-records:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch ORCID Data
        run: |
          python - <<EOF
          import requests
          import yaml
          import os

          ORCID_ID = '0000-0001-5653-0383'
          url = f"https://pub.orcid.org/v3.0/{ORCID_ID}/works"
          header = {"Accept": "application/json"}
          
          try:
              response = requests.get(url, headers=header)
              response.raise_for_status()
              data = response.json()
              
              publications = []
              groups = data.get('group') or []
              
              for group in groups:
                  summaries = group.get('work-summary') or []
                  if not summaries: continue
                  work = summaries[0]
                  
                  # --- IMPROVED AUTHOR EXTRACTION ---
                  authors_list = []
                  # ORCID stores contributors in a specific nested path
                  contribs_container = work.get('contributors') or {}
                  contribs_list = contribs_container.get('contributor') or []
                  
                  for c in contribs_list:
                      # Try 'credit-name', then 'path', then fallback to 'Unknown'
                      name_obj = c.get('credit-name') or {}
                      name = name_obj.get('value')
                      
                      if not name:
                          # Sometimes it's stored in the 'contributor-orcid' label
                          name = c.get('contributor-orcid', {}).get('path')
                          
                      if name:
                          authors_list.append(name)
                  
                  # ACS style uses semicolons to separate authors
                  authors_str = "; ".join(authors_list) if authors_list else "Author List Unavailable"

                  # --- TITLE, YEAR, JOURNAL ---
                  title = (work.get('title') or {}).get('title', {}).get('value', 'Untitled')
                  year = (work.get('publication-date') or {}).get('year', {}).get('value', 'N/A')
                  journal = (work.get('journal-title') or {}).get('value', 'N/A')
                  
                  # --- DOI/URL ---
                  url_val = ""
                  ext_ids = (work.get('external-ids') or {}).get('external-id') or []
                  for eid in ext_ids:
                      if eid.get('external-id-type') == 'doi':
                          url_val = f"https://doi.org/{eid.get('external-id-value')}"
                          break

                  publications.append({
                      'authors': str(authors_str),
                      'title': str(title),
                      'year': str(year),
                      'journal': str(journal),
                      'url': str(url_val)
                  })

              if publications:
                  publications.sort(key=lambda x: x['year'] if x['year'].isdigit() else '0000', reverse=True)

              os.makedirs('_data', exist_ok=True)
              with open('_data/publications.yml', 'w', encoding='utf-8') as f:
                  yaml.dump(publications, f, allow_unicode=True, sort_keys=False)
              
              print(f"Success: Processed {len(publications)} publications.")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/publications.yml
          git commit -m "Auto-update publications from ORCID 0000-0001-5653-0383" || exit 0
          git push