 import requests
          import yaml
          import os

          ORCID_ID = '0000-0001-5653-0383'
          url = f"https://pub.orcid.org/v3.0/{ORCID_ID}/works"
          header = {"Accept": "application/json"}
          
          try:
              response = requests.get(url, headers=header)
              response.raise_for_status()
              data = response.json()
              
              publications = []
              groups = data.get('group') or []
              
              for group in groups:
                  summaries = group.get('work-summary') or []
                  if not summaries: continue
                  
                  work = summaries[0]
                  
                  # --- ACS AUTHOR EXTRACTION ---
                  # We attempt to find the contributors list
                  authors_list = []
                  contributors_wrapper = work.get('contributors') or {}
                  contributors = contributors_wrapper.get('contributor') or []
                  
                  for c in contributors:
                      credit_name = c.get('credit-name') or {}
                      name = credit_name.get('value')
                      if name:
                          authors_list.append(name)
                  
                  # Format authors as "Name 1; Name 2; Name 3" per ACS
                  authors_str = "; ".join(authors_list) if authors_list else "Authors not listed"

                  # --- TITLE, YEAR, JOURNAL ---
                  title = (work.get('title') or {}).get('title', {}).get('value', 'Untitled')
                  year = (work.get('publication-date') or {}).get('year', {}).get('value', 'N/A')
                  journal = (work.get('journal-title') or {}).get('value', 'N/A')
                  
                  # --- DOI ---
                  url_val = ""
                  ext_ids = (work.get('external-ids') or {}).get('external-id') or []
                  for eid in ext_ids:
                      if eid.get('external-id-type') == 'doi':
                          url_val = f"https://doi.org/{eid.get('external-id-value')}"
                          break

                  publications.append({
                      'authors': str(authors_str),
                      'title': str(title),
                      'year': str(year),
                      'journal': str(journal),
                      'url': str(url_val)
                  })

              if publications:
                  publications.sort(key=lambda x: x['year'] if x['year'].isdigit() else '0000', reverse=True)

              os.makedirs('_data', exist_ok=True)
              with open('_data/publications.yml', 'w', encoding='utf-8') as f:
                  yaml.dump(publications, f, allow_unicode=True, sort_keys=False)
              
              print(f"Success: Processed {len(publications)} publications with authors.")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)