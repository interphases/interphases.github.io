name: Update Google Scholar Publications

on:
  schedule:
    - cron: "0 3 * * *"   # runs every day at 03:00
  workflow_dispatch:

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch publications from Google Scholar
        run: |
          python fetch_scholar.py

      - name: Commit updated BibTeX file
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add publications.bib
          git commit -m "Auto-update publications from Google Scholar" || echo "No changes to commit"
          git push
