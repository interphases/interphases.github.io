name: Update Publications from ORCID

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch: 

jobs:
  update-records:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch ORCID Data
        run: |
          python - <<EOF
          import requests
          import yaml
          import os

          ORCID_ID = '0000-0001-5653-0383'
          url = f"https://pub.orcid.org/v3.0/{ORCID_ID}/works"
          header = {"Accept": "application/json"}
          
          try:
              response = requests.get(url, headers=header)
              response.raise_for_status()
              data = response.json()
              
              publications = []
              # Ensure data is a dictionary and has 'group'
              if not isinstance(data, dict):
                  raise ValueError("API response is not a dictionary")
                  
              groups = data.get('group') or []
              
              for group in groups:
                  if not isinstance(group, dict): continue
                  
                  summaries = group.get('work-summary') or []
                  if not summaries: continue
                  
                  work = summaries[0]
                  if not isinstance(work, dict): continue
                  
                  # Extract Title safely
                  title_data = work.get('title') or {}
                  title_val = title_data.get('title') or {}
                  title = title_val.get('value', 'Untitled')
                  
                  # Extract Year safely
                  date_data = work.get('publication-date') or {}
                  year_data = date_data.get('year') or {}
                  year = year_data.get('value', 'N/A')
                  
                  # Extract Journal safely
                  journal_data = work.get('journal-title') or {}
                  journal = journal_data.get('value', 'N/A')
                  
                  # Extract DOI/URL safely
                  url_val = ""
                  ext_ids_wrapper = work.get('external-ids') or {}
                  ext_ids = ext_ids_wrapper.get('external-id') or []
                  for eid in ext_ids:
                      if not isinstance(eid, dict): continue
                      if eid.get('external-id-type') == 'doi':
                          val = eid.get('external-id-value')
                          url_val = f"https://doi.org/{val}"
                          break
                  
                  publications.append({
                      'title': str(title),
                      'year': str(year),
                      'journal': str(journal),
                      'url': str(url_val)
                  })

              if publications:
                  # Robust sorting that handles 'N/A' years
                  publications.sort(key=lambda x: x['year'] if x['year'].isdigit() else '0000', reverse=True)

              os.makedirs('_data', exist_ok=True)
              with open('_data/publications.yml', 'w', encoding='utf-8') as f:
                  yaml.dump(publications, f, allow_unicode=True, sort_keys=False)
              
              print(f"Success: Found {len(publications)} publications.")
          except Exception as e:
              print(f"Error during execution: {e}")
              # We let it fail with 1 so you can see it in the UI if it breaks
              exit(1)
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/publications.yml
          git commit -m "Auto-update publications from ORCID 0000-0001-5653-0383" || exit 0
          git push