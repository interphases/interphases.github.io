<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Lithium ions shuttling across a solid electrolyte interphase between two electrodes">
  <style>
    .lbl { font-family: 'Inter', sans-serif; fill: #1a1a1a; }
    .lbl-sm { font-family: 'Inter', sans-serif; fill: #6a9aad; }
  </style>
  <!-- electrolyte field -->
  <rect x="0" y="0" width="360" height="220" fill="#eef6fb"/>
  <!-- anode (graphite) -->
  <rect x="22" y="40" width="62" height="140" rx="6" fill="#5b6470"/>
  <rect x="32" y="52" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="64" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="76" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="88" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="100" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="112" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="124" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="136" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="148" width="42" height="6" rx="3" fill="#737d8a"/>
  <rect x="32" y="160" width="42" height="6" rx="3" fill="#737d8a"/>
  <!-- SEI layer -->
  <rect x="84" y="40" width="16" height="140" fill="#f7e797"/>
  <rect x="84" y="40" width="16" height="140" fill="none" stroke="#d9c65a" stroke-width="1"/>
  <!-- cathode -->
  <rect x="276" y="40" width="62" height="140" rx="6" fill="#6a9aad"/>
  <!-- migrating Li+ ions -->
  <g>
    <circle cx="135" cy="80" r="11" fill="#c6dea0" stroke="#9bb56f" stroke-width="1.5"/>
    <text x="135" y="84" text-anchor="middle" class="lbl" font-size="10" font-weight="700">Li+</text>
    <circle cx="185" cy="130" r="11" fill="#c6dea0" stroke="#9bb56f" stroke-width="1.5"/>
    <text x="185" y="134" text-anchor="middle" class="lbl" font-size="10" font-weight="700">Li+</text>
    <circle cx="225" cy="95" r="11" fill="#c6dea0" stroke="#9bb56f" stroke-width="1.5"/>
    <text x="225" y="99" text-anchor="middle" class="lbl" font-size="10" font-weight="700">Li+</text>
  </g>
  <!-- migration arrow -->
  <path d="M110 110 H262" fill="none" stroke="#0070f3" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M262 110 l-9 -5 v10 z" fill="#0070f3"/>
  <!-- labels -->
  <text x="53" y="200" text-anchor="middle" class="lbl-sm" font-size="11">anode</text>
  <text x="92" y="32" text-anchor="middle" class="lbl-sm" font-size="10" font-weight="700">SEI</text>
  <text x="307" y="200" text-anchor="middle" class="lbl-sm" font-size="11">cathode</text>
</svg>
