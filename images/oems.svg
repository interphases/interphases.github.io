<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Gas evolving from an electrochemical cell into a mass spectrometer producing a spectrum">
  <style>
    .lbl { font-family: 'Inter', sans-serif; fill: #1a1a1a; }
    .lbl-sm { font-family: 'Inter', sans-serif; fill: #6a9aad; }
  </style>
  <rect x="0" y="0" width="360" height="220" fill="#eef6fb"/>
  <!-- cell -->
  <rect x="28" y="120" width="86" height="74" rx="6" fill="#bfe3ef" stroke="#6a9aad" stroke-width="2"/>
  <rect x="42" y="150" width="14" height="40" fill="#5b6470"/>
  <rect x="86" y="150" width="14" height="40" fill="#6a9aad"/>
  <text x="71" y="210" text-anchor="middle" class="lbl-sm" font-size="11">cell</text>
  <!-- gas bubbles rising -->
  <g fill="none" stroke="#9bb56f" stroke-width="1.5">
    <circle cx="71" cy="108" r="5"/>
    <circle cx="64" cy="92" r="4"/>
    <circle cx="76" cy="78" r="6"/>
    <circle cx="70" cy="60" r="4"/>
  </g>
  <path d="M71 120 V40 H180" fill="none" stroke="#6a9aad" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M180 40 l-9 -5 v10 z" fill="#6a9aad"/>
  <text x="120" y="32" text-anchor="middle" class="lbl-sm" font-size="10">gas in</text>
  <!-- mass spectrometer -->
  <rect x="186" y="22" width="150" height="172" rx="8" fill="#ffffff" stroke="#6a9aad" stroke-width="2"/>
  <text x="261" y="40" text-anchor="middle" class="lbl" font-size="11" font-weight="700">mass spectrum</text>
  <!-- axes -->
  <path d="M204 168 H322 M204 168 V58" fill="none" stroke="#9aa6b2" stroke-width="1.5"/>
  <!-- peaks -->
  <g fill="#0070f3">
    <rect x="216" y="96" width="10" height="72"/>
    <rect x="240" y="120" width="10" height="48"/>
    <rect x="264" y="72" width="10" height="96"/>
    <rect x="288" y="132" width="10" height="36"/>
    <rect x="308" y="110" width="10" height="58"/>
  </g>
  <text x="263" y="186" text-anchor="middle" class="lbl-sm" font-size="9">m/z</text>
</svg>
