<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Iron redox couple cycling between two and three plus oxidation states for grid storage">
  <style>
    .lbl { font-family: 'Inter', sans-serif; fill: #1a1a1a; }
    .lbl-sm { font-family: 'Inter', sans-serif; fill: #6a9aad; }
  </style>
  <rect x="0" y="0" width="360" height="220" fill="#fbf3ec"/>
  <!-- redox couple nodes -->
  <circle cx="105" cy="110" r="40" fill="#ff9955"/>
  <text x="105" y="106" text-anchor="middle" class="lbl" font-size="16" font-weight="700" fill="#fff">Fe²⁺</text>
  <text x="105" y="124" text-anchor="middle" class="lbl" font-size="9" fill="#fff">reduced</text>
  <circle cx="255" cy="110" r="40" fill="#c6651f"/>
  <text x="255" y="106" text-anchor="middle" class="lbl" font-size="16" font-weight="700" fill="#fff">Fe³⁺</text>
  <text x="255" y="124" text-anchor="middle" class="lbl" font-size="9" fill="#fff">oxidized</text>
  <!-- redox arrows -->
  <path d="M150 88 q55 -34 110 0" fill="none" stroke="#6a9aad" stroke-width="2.5"/>
  <path d="M260 88 l-10 -3 l4 9 z" fill="#6a9aad"/>
  <text x="205" y="50" text-anchor="middle" class="lbl-sm" font-size="11">charge  −e⁻</text>
  <path d="M260 132 q-55 34 -110 0" fill="none" stroke="#9bb56f" stroke-width="2.5"/>
  <path d="M150 132 l10 3 l-4 -9 z" fill="#9bb56f"/>
  <text x="205" y="178" text-anchor="middle" class="lbl-sm" font-size="11">discharge  +e⁻</text>
  <!-- grid icon -->
  <g stroke="#6a9aad" stroke-width="2" fill="none">
    <path d="M320 70 l-8 110 M340 70 l8 110 M312 180 h44"/>
    <path d="M318 96 h24 M315 122 h30 M313 148 h34"/>
    <path d="M330 56 l-12 14 h24 z"/>
  </g>
  <text x="330" y="200" text-anchor="middle" class="lbl-sm" font-size="10">grid storage</text>
</svg>
